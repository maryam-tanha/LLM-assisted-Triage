# -----------------------------------------------------------------------
# Profile: mail_app
# -----------------------------------------------------------------------
# Docker Compose mail stack for RCA Framework testing.
# Target: demo-targets/mail-app/docker-compose.yml
# -----------------------------------------------------------------------

profile_name: mail_app
product: MailApp
access_method: ssh
ssh_host: 16.174.20.34
ssh_user: ubuntu
ssh_key_path: P:\LLM-RCA-Reasearch\Keys\mail-server-kalhar-laptop.pem

services:

  - service_name: mailserver
    description: >
      All-in-one mail server running Postfix (SMTP) and Dovecot (IMAP)
      via docker-mailserver. Handles inbound/outbound mail delivery and
      mailbox access for all test accounts.
    container: mail-app-mailserver-1
    host_port: 8025
    internal_port: 25
    networks:
      - back-tier
    expected_behavior: |
      Postfix listens on port 25 (SMTP) and 587 (submission).
      Dovecot listens on port 993 (IMAPS) and 143 (IMAP).
      Healthcheck: ss -lntp | grep ':25' returns a result.
      Mail queue should be near-empty under normal load (mailq shows 0 messages).
      Authentication via username/password for all test accounts.
      Logs written to /var/log/mail/mail.log inside the container.
      Note: Container runs on a host with only 414MB RAM and heavily relies on swap.
      Base disk usage on the overlay filesystem is around ~85%. Do not treat these baselines as novel anomalies.
    known_failures:
      - pattern: "postfix/smtp.*Connection refused"
        likely_cause: "Downstream relay rejected connection or destination host unreachable"
      - pattern: "postfix/qmgr.*queue file size limit exceeded"
        likely_cause: "Message exceeds POSTFIX_MESSAGE_SIZE_LIMIT (default 25MB)"
      - pattern: "dovecot.*Fatal: Error in configuration"
        likely_cause: "Dovecot config corrupt or incompatible options in /tmp/docker-mailserver/"
      - pattern: "postfix/smtpd.*SASL authentication failure"
        likely_cause: "Wrong password or account does not exist — check via: setup email list"
      - pattern: "warning: hostname .* does not resolve"
        likely_cause: "DNS not configured for mail.example.test — expected in test env"
      - pattern: "postfix/master.*daemon started"
        likely_cause: "Postfix restarted — check for upstream config change or crash"
      - pattern: "Too many connections"
        likely_cause: "Dovecot connection limit hit — check max_connections config"
      - pattern: "OOMKilled|Out of memory|Resource exhaustion"
        likely_cause: "ROUTINE SYMPTOM: VM only has 414MB RAM. Heavy swap and occasional memory kills are a known baseline issue."
      - pattern: "No space left on device|disk full"
        likely_cause: "ROUTINE SYMPTOM: Disk overlay sits at 85% capacity natively. Minor spikes cause temporary full-disk errors."
    context_commands:
      - "sudo docker exec mail-app-mailserver-1 mailq"
      - "sudo docker exec mail-app-mailserver-1 postfix status"
      - "sudo docker exec mail-app-mailserver-1 postconf mail_version"
      - "sudo docker exec mail-app-mailserver-1 postconf inet_interfaces"
      - "sudo docker exec mail-app-mailserver-1 postconf message_size_limit"
      - "sudo docker exec mail-app-mailserver-1 postconf mailbox_size_limit"
      - "sudo docker exec mail-app-mailserver-1 doveadm who"
      - "sudo docker exec mail-app-mailserver-1 df -h"
      - "sudo docker exec mail-app-mailserver-1 free -m"
      - "sudo docker exec mail-app-mailserver-1 sh -c \"ps aux | grep -E 'postfix|dovecot|master'\""
      - "sudo docker exec mail-app-mailserver-1 uptime"
    log_hints:
      - "Primary log is at /var/log/mail/mail.log — use: sudo docker exec mail-app-mailserver-1 tail -n 100 /var/log/mail/mail.log"
      - "Postfix logs: sudo docker exec mail-app-mailserver-1 sh -c \"grep 'postfix/' /var/log/mail/mail.log | tail -50\""
      - "Dovecot logs: sudo docker exec mail-app-mailserver-1 sh -c \"grep 'dovecot' /var/log/mail/mail.log | tail -50\""
      - "Queue inspection: sudo docker exec mail-app-mailserver-1 mailq"
      - "Check SASL auth failures: sudo docker exec mail-app-mailserver-1 sh -c \"grep 'SASL' /var/log/mail/mail.log | tail -20\""
      - "Check delivery failures: sudo docker exec mail-app-mailserver-1 sh -c \"grep 'status=bounced\\|status=deferred' /var/log/mail/mail.log | tail -20\""
      - "Active connections: sudo docker exec mail-app-mailserver-1 doveadm who"
    additional_info:
      owner: infra-team
      dependencies: []
      technology: docker-mailserver (Postfix + Dovecot)
      image: ghcr.io/docker-mailserver/docker-mailserver:latest

  - service_name: roundcube
    description: >
      PHP webmail client that provides browser-based access to mailboxes.
      Connects to mailserver via IMAP (993) for reading and SMTP (587) for sending.
      Uses PostgreSQL for contact/session persistence.
    container: mail-app-roundcube-1
    host_port: 8080
    internal_port: 80
    networks:
      - front-tier
      - back-tier
    expected_behavior: |
      Serves HTTP on port 80 (mapped to host :8080).
      Healthcheck: curl http://localhost/ returns HTML containing 'roundcube'.
      Successful IMAP login to mailserver on port 993 (SSL).
      Successful SMTP relay to mailserver on port 587 (STARTTLS).
      Connects to PostgreSQL (db:5432) for session and contacts storage.
    known_failures:
      - pattern: "IMAP Error: Login failed"
        likely_cause: "Wrong credentials or mailserver SASL misconfiguration"
      - pattern: "Connection to storage server failed"
        likely_cause: "mailserver IMAP port 993 unreachable — mailserver may be down"
      - pattern: "DB Error: Unable to connect"
        likely_cause: "PostgreSQL (db container) is down or credentials mismatch"
      - pattern: "SMTP Error: Could not connect to SMTP host"
        likely_cause: "mailserver port 587 is closed or TLS handshake failing"
      - pattern: "PHP Fatal error"
        likely_cause: "Roundcube PHP runtime error — check Apache error log"
    context_commands:
      - "sudo docker logs mail-app-roundcube-1 --tail 100"
      - "sudo docker exec mail-app-roundcube-1 sh -c \"cat /var/www/html/config/config.inc.php | grep -E 'default_host|smtp_server|db_dsnw'\""
      - "sudo docker exec mail-app-roundcube-1 curl -s -o /dev/null -w '%{http_code}' http://localhost/"
      - "sudo docker exec mail-app-roundcube-1 df -h"
      - "sudo docker exec mail-app-roundcube-1 free -m"
      - "sudo docker exec mail-app-roundcube-1 sh -c \"ps aux | grep apache\""
      - "sudo docker exec mail-app-roundcube-1 uptime"
    log_hints:
      - "Apache error.log and access.log are symlinked to /dev/stderr and /dev/stdout — they CANNOT be read from inside the container. Use 'sudo docker logs mail-app-roundcube-1' from the host instead."
      - "The /var/www/html/logs/ directory is typically empty in this container image. Do NOT waste iterations trying to read it."
      - "If curl http://localhost/ returns non-200, Apache is down — check ps aux."
      - "Roundcube config: cat /var/www/html/config/config.inc.php to verify IMAP/SMTP host and DB DSN."
      - "IMAP connection failures appear as 'IMAP Error' in docker logs — correlate with mailserver logs."
    additional_info:
      owner: frontend-team
      dependencies: [mailserver, db]
      technology: PHP / Roundcube / Apache
      image: roundcube/roundcubemail:1.6-apache

  - service_name: db
    description: >
      PostgreSQL database used by Roundcube to persist user preferences,
      contacts, identities, and session data.
    container: mail-app-db-1
    host_port: null
    internal_port: 5432
    networks:
      - back-tier
    expected_behavior: |
      Listens on port 5432. Healthcheck: pg_isready -U roundcube returns success.
      Database: roundcube. User: roundcube.
      Roundcube auto-initialises its schema on first startup.
    known_failures:
      - pattern: "FATAL: too many connections"
        likely_cause: "Connection pool exhausted from Roundcube"
      - pattern: "FATAL: password authentication failed for user"
        likely_cause: "Credentials mismatch between db and roundcube environment variables"
      - pattern: "could not access file"
        likely_cause: "Disk full or volume mount issue"
    context_commands:
      - "sudo docker exec mail-app-db-1 psql -U roundcube -d roundcube -c '\\dt'"
      - "sudo docker exec mail-app-db-1 psql -U roundcube -d roundcube -c 'SELECT COUNT(*) FROM users;'"
      - "sudo docker exec mail-app-db-1 psql -U roundcube -d roundcube -c 'SELECT version();'"
      - "sudo docker exec mail-app-db-1 psql -U roundcube -d roundcube -c 'SHOW max_connections;'"
      - "sudo docker exec mail-app-db-1 psql -U roundcube -d roundcube -c 'SELECT count(*) FROM pg_stat_activity;'"
      - "sudo docker exec mail-app-db-1 psql -U roundcube -d roundcube -c 'SELECT state, count(*) FROM pg_stat_activity GROUP BY state;'"
      - "sudo docker logs mail-app-db-1 --tail 100"
      - "sudo docker exec mail-app-db-1 df -h"
      - "sudo docker exec mail-app-db-1 free -m"
      - "sudo docker exec mail-app-db-1 ps aux"
      - "sudo docker exec mail-app-db-1 uptime"
    log_hints:
      - "psql -U roundcube -d roundcube -c '\\dt' — if no tables, Roundcube never initialised the schema."
      - "psql -U roundcube -d roundcube -c 'SELECT COUNT(*) FROM users;' — confirms DB connectivity and user records."
      - "SHOW max_connections; — compare against pg_stat_activity count to detect connection exhaustion."
      - "docker logs mail-app-db-1 — PostgreSQL errors (FATAL: too many connections) appear in container stdout, not in an internal log file."
      - "df -h checks available disk — a full volume prevents PostgreSQL writes."
    additional_info:
      owner: infra-team
      dependencies: []
      technology: PostgreSQL 15 (Alpine)
      image: postgres:15-alpine
      credentials:
        user: roundcube
        password: roundcube

  - service_name: redis
    description: >
      Redis in-memory store used by Roundcube as a session cache.
      Stores active web sessions to reduce PostgreSQL load.
    container: mail-app-redis-1
    host_port: null
    internal_port: 6379
    networks:
      - back-tier
    expected_behavior: |
      Listens on port 6379. Healthcheck: redis-cli PING returns PONG.
      maxmemory: 128MB with allkeys-lru eviction.
      Under normal usage, connected_clients should be >= 1 (Roundcube).
    known_failures:
      - pattern: "OOM command not allowed when used memory > 'maxmemory'"
        likely_cause: "Session data accumulated beyond 128MB limit — check connected clients"
      - pattern: "MISCONF Redis is configured to save RDB snapshots"
        likely_cause: "Disk full or permission issue on /data volume"
    context_commands:
      - "sudo docker exec mail-app-redis-1 redis-cli PING"
      - "sudo docker exec mail-app-redis-1 redis-cli INFO server"
      - "sudo docker exec mail-app-redis-1 redis-cli INFO memory"
      - "sudo docker exec mail-app-redis-1 redis-cli INFO clients"
      - "sudo docker exec mail-app-redis-1 redis-cli INFO stats"
      - "sudo docker exec mail-app-redis-1 redis-cli DBSIZE"
      - "sudo docker logs mail-app-redis-1 --tail 50"
      - "sudo docker exec mail-app-redis-1 df -h"
      - "sudo docker exec mail-app-redis-1 free -m"
    log_hints:
      - "redis-cli PING must return PONG — any other response means Redis is unhealthy."
      - "redis-cli INFO memory shows used_memory vs maxmemory — check for eviction pressure."
      - "redis-cli INFO clients shows connected_clients — expect >= 1 from Roundcube."
      - "There are no Redis log files inside the container (/var/log/redis/ does not exist). Use 'sudo docker logs mail-app-redis-1' for Redis server output."
    additional_info:
      owner: infra-team
      dependencies: []
      technology: Redis 7 (Alpine)
      image: redis:7-alpine
