agent_type: runtime_status
description: >
  Checks container runtime health and resource usage: memory consumption, disk space,
  CPU load, process state, OOM risk, and resource limits.
when_to_use: |
  - Use as a baseline check alongside log for any service that could be under resource pressure.
  - Any incident where a service is slow, restarting, or behaving unexpectedly — memory pressure,
    disk full, or OOM kills are a common silent contributor that log analysis alone won't catch.
  - When investigating stateful services (redis, db, worker) always pair with log to rule out
    resource exhaustion as a contributing factor.
  - When the incident involves slowness, latency, or intermittent failures across the pipeline.
